<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Join as Therapist - Ecstasy Retreat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #18243D;
      color: #d4af37;
      background: url('https://www.transparenttextures.com/patterns/stardust.png'), linear-gradient(135deg, #18243D 0%, #1f1f1f 100%);
      background-blend-mode: overlay;
      animation: sparkle 10s linear infinite;
    }

    @keyframes sparkle {
      0% { background-position: 0 0; }
      100% { background-position: 100px 100px; }
    }

    header, footer {
      background: #18243D;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      position: relative;
    }

    .share-btn, .menu-toggle {
      font-size: 1.5rem;
      color: #d4af37;
      cursor: pointer;
    }

    .logo {
      display: flex;
      justify-content: center;
      align-items: center;
      animation: pulse 4s infinite;
    }

    .logo img {
      height: 50px;
    }

    nav {
      display: none;
      flex-direction: column;
      background: #18243D;
      width: 100%;
      position: absolute;
      top: 60px;
      right: 0;
      padding: 10px 20px;
      text-align: right;
    }

    nav.active { display: flex; }

    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    nav ul li a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      display: block;
      margin: 10px 0;
    }

    @media (min-width: 769px) {
      nav { display: flex !important; position: static; flex-direction: row; background: none; width: auto; }
      nav ul { display: flex; gap: 20px; }
      .menu-toggle { display: none; }
    }

    main {
      padding: 40px 20px;
      max-width: 600px;
      margin: auto;
      background: rgba(24, 36, 61, 0.85);
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.7);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #fff;
    }

    label {
      display: block;
      margin: 15px 0 5px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
      background: #fff;
      color: #000;
    }

    button {
      background: #d4af37;
      color: #18243D;
      padding: 12px 20px;
      font-weight: bold;
      border: none;
      border-radius: 30px;
      width: 100%;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    button:hover {
      background: #fff3a8;
      color: #000;
    }

    footer {
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .social-icons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
    }

    .social-icons a {
      color: #d4af37;
      font-size: 1.5rem;
      text-decoration: none;
    }

    .credit {
      text-align: center;
    }

    .credit a {
      color: #d4af37;
      text-decoration: none;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <header>
    <div class="share-btn" onclick="shareWebsite()"><i class="fas fa-share-square"></i></div>
    <div class="logo" onclick="location.href='index.html'"><img src="images/logo.png" alt="Ecstasy Retreat Logo"></div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <nav id="mobileMenu">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="therapists.html">Therapists</a></li>
        <li><a href="bookings.html">Bookings</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="join-therapist.html">Join as Therapist</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>Join Our Therapist Team</h1>
    <form>
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Your full name" required>

      <label for="area">Area</label>
      <input type="text" id="area" placeholder="e.g., Sandton, Midrand" required>

      <label for="experience">Years of Experience</label>
      <input type="number" id="experience" min="0" required>

      <label for="bio">Short Bio</label>
      <textarea id="bio" rows="4" placeholder="Tell us about yourself" required></textarea>

      <label for="whatsapp">WhatsApp Number</label>
      <input type="tel" id="whatsapp" placeholder="e.g., 0812345678" required>

      <button type="submit">Submit Application</button>
    </form>
  </main>

  <footer>
    <div class="social-icons">
      <a href="#"><i class="fas fa-envelope"></i></a>
      <a href="#"><i class="fab fa-whatsapp"></i></a>
      <a href="#"><i class="fab fa-facebook"></i></a>
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-twitter"></i></a>
      <a href="#"><i class="fab fa-tiktok"></i></a>
      <a href="#"><i class="fab fa-linkedin"></i></a>
    </div>
    <div class="credit">
      <a href="https://virtualwarecloud.github.io/services/" target="_blank">
        <i class="fas fa-paper-plane"></i> Designed by VirtualWareCloud
      </a>
    </div>
  </footer>

  <script>
    function toggleMenu() {
      document.getElementById("mobileMenu").classList.toggle("active");
    }

    async function shareWebsite() {
      if (navigator.share) {
        await navigator.share({
          title: 'Ecstasy Retreat',
          text: 'Join as a mobile massage therapist!',
          url: window.location.href
        });
      } else {
        alert("Sharing not supported on this device.");
      }
    }
  </script>
</body>
</html>
