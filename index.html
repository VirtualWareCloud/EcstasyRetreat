<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ecstasy Retreat - Mobile Massage Therapists</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #18243D;
      color: #d4af37;
      background: url('https://www.transparenttextures.com/patterns/stardust.png'), linear-gradient(135deg, #18243D 0%, #1f1f1f 100%);
      background-blend-mode: overlay;
      animation: sparkle 10s linear infinite;
    }

    @keyframes sparkle {
      0% { background-position: 0 0; }
      100% { background-position: 100px 100px; }
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #18243D;
      padding: 10px 20px;
      position: relative;
      z-index: 1000;
      flex-wrap: wrap;
    }

    .share-btn {
      font-size: 1.5rem;
      color: #d4af37;
      cursor: pointer;
    }

    .logo {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 4s infinite;
    }

    .logo img {
      height: 50px;
      transition: transform 0.3s ease;
    }

    .logo:hover img {
      transform: scale(1.1);
    }

    nav {
      order: 3;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 20px;
      padding: 0;
      margin: 0;
    }

    nav ul li a {
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
    }

    .menu-toggle {
      font-size: 2rem;
      color: #d4af37;
      cursor: pointer;
      display: none;
    }

    @media (max-width: 768px) {
      .menu-toggle { display: block; }

      nav ul {
        display: none;
        flex-direction: column;
        align-items: center;
        background: #18243D;
        width: 100%;
        position: absolute;
        top: 70px;
        left: 0;
        padding: 20px 0;
        border-top: 1px solid #333;
      }

      nav ul.active {
        display: flex;
      }
    }

    main {
      padding: 0;
    }

    .hero-carousel {
      position: relative;
      height: 80vh;
      overflow: hidden;
    }

    .hero-carousel img {
      position: absolute;
      width: 100%;
      height: 80vh;
      object-fit: cover;
      opacity: 0;
      animation: fadeSlides 12s infinite;
    }

    .hero-carousel img:nth-child(1) { animation-delay: 0s; }
    .hero-carousel img:nth-child(2) { animation-delay: 4s; }
    .hero-carousel img:nth-child(3) { animation-delay: 8s; }

    @keyframes fadeSlides {
      0%, 100% { opacity: 0; }
      10%, 30% { opacity: 1; }
      40%, 100% { opacity: 0; }
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
      color: #d4af37;
      cursor: pointer;
      z-index: 10;
      background: rgba(0, 0, 0, 0.3);
      padding: 10px;
      border-radius: 50%;
    }

    .arrow.left { left: 10px; }
    .arrow.right { right: 10px; }

    .hero-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #fff;
      padding: 20px;
      background-color: rgba(24,36,61,0.6);
      border-radius: 12px;
      animation: textFloat 8s ease-in-out infinite alternate;
    }

    .hero-text h1 {
      font-size: 1.6rem;
      margin: 0;
      color: #d4af37;
    }

    .hero-text p {
      margin-top: 10px;
      font-size: 1rem;
    }

    .hero-text a {
      background-color: #18243D;
      color: #d4af37;
      padding: 10px 20px;
      border-radius: 30px;
      text-decoration: none;
      display: inline-block;
      margin-top: 15px;
      font-weight: bold;
    }

    .hero-text a:hover {
      background: #fff3a8;
    }

    @keyframes textFloat {
      0% { transform: translate(-50%, -52%); }
      100% { transform: translate(-50%, -48%); }
    }

    footer {
      background: #18243D;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .social-icons a {
      color: #d4af37;
      font-size: 1.5rem;
      text-decoration: none;
    }

    .credit {
      color: #d4af37;
      font-size: 0.9rem;
    }

    .credit a {
      color: #d4af37;
      text-decoration: none;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .hero-title-typewriter {
      text-align: center;
      padding: 20px 10px 0;
      background-color: transparent;
    }

    .hero-title-typewriter h1 {
      color: #d4af37;
      font-size: 1.6rem;
      font-weight: bold;
      overflow: hidden;
      white-space: nowrap;
      border-right: 2px solid #d4af37;
      width: 0;
      animation: typing 4s steps(30, end) forwards, blink 0.7s step-end infinite;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }

    @keyframes blink {
      from, to { border-color: transparent }
      50% { border-color: #d4af37 }
    }
  </style>
</head>
<body>

<header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px;">
  <div class="share-btn" onclick="shareWebsite()" style="flex: 1;">
    <i class="fas fa-share-square"></i>
  </div>

  <div class="logo" onclick="location.href='index.html'" style="flex: 1; text-align: center;">
    <img src="images/logo.png" alt="Ecstasy Retreat Logo" style="height: 50px; cursor: pointer; transition: transform 0.3s;">
  </div>

  <div class="menu-toggle" onclick="toggleMenu()" style="flex: 1; text-align: right;">
    ☰
  </div>
</header>

<div class="hero-title-typewriter">
  <h1 id="typewriter-text"></h1>
</div>

<main>
  <div class="hero-carousel">
    <img class="slide active" src="images/slide1.jpg" alt="Slide 1">
    <img class="slide" src="images/slide2.jpg" alt="Slide 2">
    <img class="slide" src="images/slide3.jpg" alt="Slide 3">

    <div class="arrow left" onclick="changeSlide(-1)">❮</div>
    <div class="arrow right" onclick="changeSlide(1)">❯</div>

    <div class="hero-text">
      <h1>Welcome to Ecstasy Retreat</h1>
      <p>Experience Tranquility, Balance, and Bliss</p>
      <a href="therapists.html">View Therapists</a>
    </div>
  </div>
</main>

<footer>
  <div class="social-icons">
    <a href="mailto:someone@example.com"><i class="fas fa-envelope"></i></a>
    <a href="https://wa.me/"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.facebook.com/"><i class="fab fa-facebook"></i></a>
    <a href="https://www.instagram.com/"><i class="fab fa-instagram"></i></a>
    <a href="https://twitter.com/"><i class="fab fa-twitter"></i></a>
    <a href="https://www.tiktok.com/"><i class="fab fa-tiktok"></i></a>
    <a href="https://www.linkedin.com/"><i class="fab fa-linkedin"></i></a>
  </div>
  <div class="credit">
    <a href="https://virtualwarecloud.github.io/services/" target="_blank">Designed by VirtualWareCloud</a>
  </div>
</footer>

<script>
  function toggleMenu() {
    const navList = document.querySelector("nav ul");
    if (navList) navList.classList.toggle("active");
  }

  async function shareWebsite() {
    if (navigator.share) {
      await navigator.share({
        title: 'Ecstasy Retreat',
        text: 'Relax with premium mobile massage services',
        url: window.location.href
      });
    } else {
      alert("Sharing not supported on this device.");
    }
  }

  document.addEventListener("DOMContentLoaded", function () {
    document.getElementById("typewriter-text").textContent = "Welcome to Ecstasy Retreat";
  });
</script>

</body>
</html>
