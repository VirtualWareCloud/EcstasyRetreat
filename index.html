<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ecstasy Retreat - Mobile Massage Therapists</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #18243D;
      color: #d4af37;
      background: url('https://www.transparenttextures.com/patterns/stardust.png'),
                  linear-gradient(135deg, #18243D 0%, #1f1f1f 100%);
      background-blend-mode: overlay;
      animation: sparkle 10s linear infinite;
    }

    @keyframes sparkle {
      0% { background-position: 0 0; }
      100% { background-position: 100px 100px; }
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #18243D;
      padding: 10px 20px;
      position: relative;
      z-index: 1000;
    }

    .logo {
      display: flex;
      align-items: center;
    }

    .logo img {
      height: 50px;
      margin-right: 10px;
    }

    .logo span {
      font-size: 1.5rem;
      font-weight: bold;
      color: #d4af37;
    }

    nav {
      flex-grow: 1;
      display: flex;
      justify-content: center;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 20px;
      padding: 0;
      margin: 0;
    }

    nav ul li a {
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
    }

    .menu-toggle {
      font-size: 2rem;
      color: #d4af37;
      cursor: pointer;
      display: none;
    }

    @media (max-width: 768px) {
      .menu-toggle {
        display: block;
      }

      nav ul {
        display: none;
        flex-direction: column;
        align-items: center;
        background: #18243D;
        width: 100%;
        position: absolute;
        top: 70px;
        left: 0;
        padding: 20px 0;
        border-top: 1px solid #333;
      }

      nav ul.active {
        display: flex;
        animation: slideDown 0.3s ease-out forwards;
      }

      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }
    }

    main {
      padding: 0;
    }

    .hero-carousel {
      position: relative;
      overflow: hidden;
      max-height: 80vh;
    }

    .hero-carousel img {
      width: 100%;
      height: 80vh;
      object-fit: cover;
      animation: fadeZoom 10s ease-in-out infinite;
    }

    @keyframes fadeZoom {
      0% { opacity: 0.9; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
      100% { opacity: 0.9; transform: scale(1); }
    }

    .hero-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #fff;
      padding: 20px;
      background-color: rgba(24,36,61,0.6);
      border-radius: 12px;
      animation: textFloat 8s ease-in-out infinite alternate;
    }

    .hero-text h1 {
      font-size: 2.2rem;
      margin: 0;
      color: #d4af37;
    }

    .hero-text p {
      margin-top: 10px;
      font-size: 1rem;
    }

    @keyframes textFloat {
      0% { transform: translate(-50%, -52%); }
      100% { transform: translate(-50%, -48%); }
    }

    footer {
      background: #18243D;
      text-align: center;
      padding: 20px;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .social-icons a {
      color: #d4af37;
      font-size: 1.5rem;
      text-decoration: none;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="images/logo.png" alt="Ecstasy Retreat Logo">
    <span>Ecstasy Retreat</span>
  </div>

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="bookings.html">Booking</a></li>
      <li><a href="image-gallery.html">Gallery</a></li>
      <li><a href="join-therapist.html">Join as Therapist</a></li>
      <li><a href="therapists.html">Therapists</a></li>
    </ul>
  </nav>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</header>

<main>
  <div class="hero-carousel">
    <img src="images/slide1.jpg" alt="Relaxing Massage">
    <div class="hero-text">
      <h1>Welcome to Ecstasy Retreat</h1>
      <p>Experience Tranquility, Balance, and Bliss</p>
    </div>
  </div>
</main>

<footer>
  <div class="social-icons">
    <a href="#"><i class="fas fa-envelope"></i></a>
    <a href="#"><i class="fab fa-whatsapp"></i></a>
    <a href="#"><i class="fab fa-facebook"></i></a>
    <a href="#"><i class="fab fa-instagram"></i></a>
    <a href="#"><i class="fab fa-twitter"></i></a>
    <a href="#"><i class="fab fa-tiktok"></i></a>
    <a href="#"><i class="fab fa-linkedin"></i></a>
  </div>
  <p>&copy; 2025 Ecstasy Retreat</p>
</footer>

<script>
  function toggleMenu() {
    const navList = document.querySelector("nav ul");
    navList.classList.toggle("active");
  }
</script>

</body>
</html>
