<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecstasy Retreat - Mobile Massage Therapists</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #0f0f0f;
      background: url('https://www.transparenttextures.com/patterns/stardust.png'), linear-gradient(135deg, #000000 0%, #1f1f1f 100%);
      background-blend-mode: overlay;
      color: #d4af37;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #0f0f0f;
      padding: 10px 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      height: 50px;
    }

    .logo span {
      font-size: 1.5rem;
      font-weight: bold;
      color: #d4af37;
    }

    nav ul {
      display: flex;
      gap: 20px;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    nav ul li a {
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
    }

    /* Updated Slideshow CSS */
    .slideshow-container {
      position: relative;
      max-width: 100%;
      margin: auto;
      overflow: hidden;
    }

    .slide {
      display: none;
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    .slide.active {
      display: block;
    }

    .prev, .next {
      cursor: pointer;
      position: absolute;
      top: 50%;
      width: auto;
      padding: 16px;
      margin-top: -22px;
      color: #d4af37;
      font-weight: bold;
      font-size: 18px;
      transition: 0.3s;
      border-radius: 0 3px 3px 0;
      user-select: none;
      background: rgba(0, 0, 0, 0.3);
    }

    .next {
      right: 0;
      border-radius: 3px 0 0 3px;
    }

    .prev:hover, .next:hover {
      background-color: rgba(0, 0, 0, 0.6);
    }

    main {
      text-align: center;
      padding: 20px;
    }

    .animated-heading {
      font-size: 2rem;
      margin-top: 20px;
      color: #d4af37;
      animation: floatLeftRight 6s ease-in-out infinite alternate;
    }

    @keyframes floatLeftRight {
      0% { transform: translateX(0); }
      100% { transform: translateX(50px); }
    }

    footer {
      background-color: #0f0f0f;
      text-align: center;
      padding: 20px;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .social-icons a {
      color: #d4af37;
      font-size: 1.5rem;
      text-decoration: none;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img class="logo-img" src="images/Ekstase Toevlugte Logo.jpg" alt="Ecstasy Retreat Logo">
    <span>Ecstasy Retreat</span>
  </div>
  <nav>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">About Us</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Therapists</a></li>
      <li><a href="#">Book Now</a></li>
      <li><a href="#">Gallery</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>
</header>

<main>
  <div class="slideshow-container">
    <img class="slide active" src="images/slide1.jpg" alt="Massage Slide 1">
    <img class="slide" src="images/slide2.jpg" alt="Massage Slide 2">
    <img class="slide" src="images/slide3.jpg" alt="Massage Slide 3">
    <a class="prev" onclick="changeSlide(-1)">&#10094;</a>
    <a class="next" onclick="changeSlide(1)">&#10095;</a>
  </div>
  <h1 class="animated-heading">Welcome to Ecstasy Retreat, Your Sanctuary of Serenity</h1>
</main>

<footer>
  <div class="social-icons">
    <a href="https://www.facebook.com"><i class="fab fa-facebook"></i></a>
    <a href="https://www.instagram.com"><i class="fab fa-instagram"></i></a>
    <a href="https://www.x.com"><i class="fab fa-twitter"></i></a>
    <a href="https://www.snapchat.com"><i class="fab fa-snapchat"></i></a>
    <a href="https://www.youtube.com"><i class="fab fa-youtube"></i></a>
    <a href="https://www.tiktok.com"><i class="fab fa-tiktok"></i></a>
  </div>
  <p>&copy; 2025 Ecstasy Retreat</p>
</footer>

<script>
let currentSlide = 0;
const slides = document.querySelectorAll('.slide');

function showSlide(index) {
  slides.forEach((slide, i) => {
    slide.classList.remove('active');
    if (i === index) {
      slide.classList.add('active');
    }
  });
}

function changeSlide(direction) {
  currentSlide += direction;
  if (currentSlide >= slides.length) currentSlide = 0;
  if (currentSlide < 0) currentSlide = slides.length - 1;
  showSlide(currentSlide);
}

// Optional: Automatic slideshow every 5 seconds
setInterval(() => {
  changeSlide(1);
}, 5000);
</script>

</body>
</html>
