<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ecstasy Retreat - Mobile Massage Therapists</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: url('https://www.transparenttextures.com/patterns/stardust.png'),
                  linear-gradient(135deg, #18243D 0%, #1f1f1f 100%);
      color: #d4af37;
      background-blend-mode: overlay;
      animation: sparkle 10s linear infinite;
    }

    @keyframes sparkle {
      0% { background-position: 0 0; }
      100% { background-position: 100px 100px; }
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #18243D;
      padding: 10px 20px;
      flex-wrap: wrap;
      position: relative;
    }

    .share-btn {
      font-size: 1.3rem;
      color: #d4af37;
      cursor: pointer;
    }

    .logo {
      cursor: pointer;
      animation: pulse 3s infinite;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo img {
      height: 50px;
      transition: transform 0.3s ease;
    }

    .logo:hover img {
      transform: scale(1.1);
    }

    nav {
      order: 2;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 15px;
      padding: 0;
      margin: 0;
    }

    nav ul li a {
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
    }

    .menu-toggle {
      font-size: 2rem;
      color: #d4af37;
      display: none;
    }

    @media (max-width: 768px) {
      .menu-toggle {
        display: block;
      }

      nav ul {
        display: none;
        flex-direction: column;
        align-items: center;
        background: #18243D;
        width: 100%;
        position: absolute;
        top: 70px;
        left: 0;
        padding: 20px 0;
        border-top: 1px solid #333;
      }

      nav ul.active {
        display: flex;
      }
    }

    .hero-carousel {
      position: relative;
      height: 80vh;
      overflow: hidden;
    }

    .hero-carousel img {
      width: 100%;
      height: 80vh;
      object-fit: cover;
      position: absolute;
      opacity: 0;
      animation: fadeSlides 12s infinite;
    }

    .hero-carousel img:nth-child(1) { animation-delay: 0s; }
    .hero-carousel img:nth-child(2) { animation-delay: 4s; }
    .hero-carousel img:nth-child(3) { animation-delay: 8s; }

    @keyframes fadeSlides {
      0%, 100% { opacity: 0; }
      10%, 33% { opacity: 1; }
      43%, 100% { opacity: 0; }
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
      color: #d4af37;
      cursor: pointer;
      z-index: 100;
      background: rgba(0, 0, 0, 0.3);
      padding: 10px;
      border-radius: 50%;
    }

    .arrow.left { left: 10px; }
    .arrow.right { right: 10px; }

    .hero-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(24,36,61,0.7);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }

    .hero-text h1 {
      font-size: 2.2rem;
      margin: 0;
      color: #d4af37;
    }

    .hero-text p {
      margin-top: 10px;
      font-size: 1rem;
    }

    .hero-text a {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #d4af37;
      color: #18243D;
      font-weight: bold;
      border-radius: 30px;
      text-decoration: none;
      transition: background 0.3s ease;
    }

    .hero-text a:hover {
      background: #fff3a8;
    }

    footer {
      background: #18243D;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      padding: 20px;
    }

    .social-icons {
      display: flex;
      gap: 20px;
    }

    .social-icons a {
      color: #d4af37;
      font-size: 1.5rem;
    }

    .credit {
      color: #d4af37;
      font-size: 0.9rem;
    }

    .credit a {
      color: #d4af37;
      text-decoration: none;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<header>
  <div class="share-btn" onclick="shareWebsite()"><i class="fas fa-share-alt"></i></div>

  <div class="logo" onclick="location.href='index.html'">
    <img src="images/logo.png" alt="Ecstasy Retreat Logo">
  </div>

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="bookings.html">Booking</a></li>
      <li><a href="image-gallery.html">Gallery</a></li>
      <li><a href="join-therapist.html">Join as Therapist</a></li>
      <li><a href="therapists.html">Therapists</a></li>
    </ul>
  </nav>
</header>

<main>
  <div class="hero-carousel">
    <img src="images/slide1.jpg" alt="Slide 1">
    <img src="images/slide2.jpg" alt="Slide 2">
    <img src="images/slide3.jpg" alt="Slide 3">

    <div class="arrow left" onclick="prevSlide()">❮</div>
    <div class="arrow right" onclick="nextSlide()">❯</div>

    <div class="hero-text">
      <h1>Welcome to Ecstasy Retreat</h1>
      <p>Experience Tranquility, Balance, and Bliss</p>
      <a href="therapists.html">View Therapists</a>
    </div>
  </div>
</main>

<footer>
  <div style="flex: 1; display: flex; justify-content: center;">
    <div class="social-icons">
      <a href="#"><i class="fas fa-envelope"></i></a>
      <a href="#"><i class="fab fa-whatsapp"></i></a>
      <a href="#"><i class="fab fa-facebook"></i></a>
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-twitter"></i></a>
      <a href="#"><i class="fab fa-tiktok"></i></a>
      <a href="#"><i class="fab fa-linkedin"></i></a>
    </div>
  </div>
  <div class="credit" style="flex: 1; text-align: right;">
    Designed by <a href="https://virtualwarecloud.github.io/services/" target="_blank">VirtualWareCloud</a>
  </div>
</footer>


<script>
  function toggleMenu() {
    const navList = document.querySelector("nav ul");
    navList.classList.toggle("active");
  }

  async function shareWebsite() {
    if (navigator.share) {
      await navigator.share({
        title: 'Ecstasy Retreat',
        text: 'Relax with premium mobile massage services',
        url: window.location.href
      });
    } else {
      alert("Sharing not supported on this device.");
    }
  }

  function prevSlide() {
    const imgs = document.querySelectorAll('.hero-carousel img');
    imgs.forEach(i => i.style.animationPlayState = 'paused');
    imgs[0].parentElement.appendChild(imgs[0]);
  }

  function nextSlide() {
    const imgs = document.querySelectorAll('.hero-carousel img');
    imgs.forEach(i => i.style.animationPlayState = 'paused');
    imgs[imgs.length - 1].parentElement.insertBefore(imgs[imgs.length - 1], imgs[0]);
  }
</script>

</body>
</html>
