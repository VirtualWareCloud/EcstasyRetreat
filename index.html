<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ecstasy Retreat - Mobile Massage Therapists</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />  <style>
    /* Body Styling with Stardust Overlay */
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #18243D;
      color: #d4af37;
      background: url('https://www.transparenttextures.com/patterns/stardust.png'), linear-gradient(135deg, #18243D 0%, #1f1f1f 100%);
      background-blend-mode: overlay;
      animation: sparkle 10s linear infinite;
    }

    @keyframes sparkle {
      0% { background-position: 0 0; }
      100% { background-position: 100px 100px; }
    }

    /* Header Layout */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #18243D;
      padding: 10px 20px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1000;
    }

    .share-btn, .menu-toggle {
      font-size: 1.5rem;
      color: #d4af37;
      cursor: pointer;
    }

    .logo {
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      animation: pulse 4s infinite;
    }

    .logo img {
      height: 50px;
      transition: transform 0.3s ease;
    }

    .logo:hover img {
      transform: scale(1.1);
    }

    nav {
      display: none;
      flex-direction: column;
      background: #18243D;
      width: 100%;
      position: absolute;
      top: 60px;
      right: 0;
      text-align: right;
      padding: 10px 20px;
      z-index: 999;
    }

    nav ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    nav ul li {
      margin: 10px 0;
    }

    nav ul li a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }

    nav.active {
      display: flex;
    }

    @media (min-width: 769px) {
      nav {
        display: flex !important;
        position: static;
        flex-direction: row;
        width: auto;
        background: none;
      }

      nav ul {
        display: flex;
        gap: 20px;
      }

      .menu-toggle {
        display: none;
      }
    }

    /* Typewriter animation */
    .hero-title-typewriter {
      text-align: center;
      padding: 10px;
    }

    .hero-title-typewriter h1 {
      color: #d4af37;
      font-size: 1.6rem;
      font-weight: bold;
      overflow: hidden;
      white-space: nowrap;
      border-right: 2px solid #d4af37;
      width: 100%;
      animation: typing 5s steps(30, end) infinite alternate, blink 0.7s step-end infinite;
    }

    @keyframes typing {
      0% { width: 0 }
      100% { width: 100% }
    }

    @keyframes blink {
      from, to { border-color: transparent; }
      50% { border-color: #d4af37; }
    }

    .hero-carousel {
      position: relative;
      height: 80vh;
      overflow: hidden;
    }

    .hero-carousel img {
      position: absolute;
      width: 100%;
      height: 80vh;
      object-fit: cover;
      opacity: 0;
      animation: fadeSlides 12s infinite;
    }

    .hero-carousel img:nth-child(1) { animation-delay: 0s; }
    .hero-carousel img:nth-child(2) { animation-delay: 4s; }
    .hero-carousel img:nth-child(3) { animation-delay: 8s; }

    @keyframes fadeSlides {
      0%, 100% { opacity: 0; }
      10%, 30% { opacity: 1; }
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
      color: #d4af37;
      cursor: pointer;
      z-index: 10;
      background: rgba(0, 0, 0, 0.3);
      padding: 10px;
      border-radius: 50%;
    }

    .arrow.left { left: 10px; }
    .arrow.right { right: 10px; }

    .hero-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      background-color: rgba(24,36,61,0.6);
      padding: 20px;
      border-radius: 12px;
    }

    .hero-text p {
      font-size: 1rem;
      color: #fff;
    }

    .hero-text a {
      background-color: #18243D;
      color: #d4af37;
      padding: 10px 20px;
      border-radius: 30px;
      text-decoration: none;
      display: inline-block;
      font-weight: bold;
    }

    footer {
      background: #18243D;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .social-icons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
    }

    .social-icons a {
      color: #d4af37;
      font-size: 1.5rem;
      text-decoration: none;
    }

    .credit {
      text-align: center;
    }

    .credit a {
      color: #d4af37;
      text-decoration: none;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style></head><body>
  <header>
    <div class="share-btn" onclick="shareWebsite()">
      <i class="fas fa-share-square"></i>
    </div>
    <div class="logo" onclick="location.href='index.html'">
      <img src="images/logo.png" alt="Ecstasy Retreat Logo">
    </div>
    <div class="menu-toggle" onclick="toggleMenu()">
      ☰
    </div>
    <nav id="mobileMenu">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="therapists.html">Therapists</a></li>
        <li><a href="bookings.html">Bookings</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>  <div class="hero-title-typewriter">
    <h1>Welcome to Ecstasy Retreat</h1>
  </div>  <main>
    <div class="hero-carousel">
      <img src="images/slide1.jpg" alt="Slide 1">
      <img src="images/slide2.jpg" alt="Slide 2">
      <img src="images/slide3.jpg" alt="Slide 3">
      <div class="arrow left" onclick="prevSlide()">❮</div>
      <div class="arrow right" onclick="nextSlide()">❯</div>
      <div class="hero-text">
        <p>Experience Tranquility, Balance, and Bliss</p>
        <a href="therapists.html">View Therapists</a>
      </div>
    </div>
  </main>  <footer>
    <div class="social-icons">
      <a href="#"><i class="fas fa-envelope"></i></a>
      <a href="#"><i class="fab fa-whatsapp"></i></a>
      <a href="#"><i class="fab fa-facebook"></i></a>
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-twitter"></i></a>
      <a href="#"><i class="fab fa-tiktok"></i></a>
      <a href="#"><i class="fab fa-linkedin"></i></a>
    </div>
    <div class="credit">
      <a href="https://virtualwarecloud.github.io/services/" target="_blank">
        <i class="fas fa-paper-plane"></i> Designed by VirtualWareCloud
      </a>
    </div>
  </footer>  <script>
    function toggleMenu() {
      document.getElementById("mobileMenu").classList.toggle("active");
    }

    async function shareWebsite() {
      if (navigator.share) {
        await navigator.share({
          title: 'Ecstasy Retreat',
          text: 'Relax with premium mobile massage services',
          url: window.location.href
        });
      } else {
        alert("Sharing not supported on this device.");
      }
    }

    function prevSlide() {
      const slides = document.querySelectorAll('.hero-carousel img');
      slides[0].parentNode.appendChild(slides[0]);
    }

    function nextSlide() {
      const slides = document.querySelectorAll('.hero-carousel img');
      slides[slides.length - 1].parentNode.insertBefore(slides[slides.length - 1], slides[0]);
    }
  </script></body>
</html>
