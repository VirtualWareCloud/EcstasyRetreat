<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Booking - Ecstasy Retreat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    /* Same styles from index.html */
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="images/logo.png" alt="Ecstasy Retreat Logo">
    <span>Ecstasy Retreat</span>
  </div>

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="booking.html">Booking</a></li>
      <li><a href="image-gallery.html">Gallery</a></li>
      <li><a href="join-therapist.html">Join as Therapist</a></li>
      <li><a href="therapists.html">Therapists</a></li>
    </ul>
  </nav>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</header>

<main>
  <h1 class="animated-heading">Book Your Massage Experience</h1>
  <form>
    <!-- Booking form content goes here -->
    <label for="name">Full Name:</label>
    <input type="text" id="name" name="name" required>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>
    <label for="appointment">Preferred Date & Time:</label>
    <input type="datetime-local" id="appointment" name="appointment" required>
    <button type="submit">Book Now</button>
  </form>
</main>

<footer>
  <div class="social-icons">
    <!-- Social icons -->
  </div>
  <p>&copy; 2025 Ecstasy Retreat</p>
</footer>

<script>
  function toggleMenu() {
    const navList = document.querySelector("nav ul");
    navList.classList.toggle("active");
  }
</script>

</body>
</html>
